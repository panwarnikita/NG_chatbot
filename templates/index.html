<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NavGurukul AI Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-brand">NaviAI ✨</div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        
        <div class="history-list" id="history-list">
            {% for chat in history %}
            <div class="history-card" onclick="loadThread('{{ chat.chat_id }}')">
                {{ chat.question }}...
            </div>
            {% endfor %}
        </div>
    </aside>

    <main id="main-content">
        <header>
            <div class="brand-name-header">NaviAI <span>✨</span></div>
            <div class="user-info">
                <span>{{ user.name }}</span>
                <a href="/logout">Logout</a>
            </div>
        </header>

        <div id="chat-window">
            <div id="landing-container">
                <div class="welcome-text">
                    <h1 class="gradient-text">Hi {{ user.name }},</h1>
                    <h2>I am the NavGurukul AI Assistant. How can I help you today?</h2>
                </div>
                
                <div class="quick-cards">
                    <div class="card" onclick="quickAsk('What is NavGurukul?')">
                        <p>What is NavGurukul?</p>
                        <span class="card-icon">🏫</span>
                    </div>
                    <div class="card" onclick="quickAsk('Tell me about Admission process')">
                        <p>Admission Process</p>
                        <span class="card-icon">📝</span>
                    </div>
                    <div class="card" onclick="quickAsk('Show me success stories')">
                        <p>Success Stories</p>
                        <span class="card-icon">🌟</span>
                    </div>
                    <div class="card" onclick="quickAsk('Explain Etiocracy')">
                        <p>Etiocracy Model</p>
                        <span class="card-icon">🤝</span>
                    </div>
                </div>
            </div>
        </div>

   <div class="input-container">
    <div class="input-bar">
        <label for="file-upload" class="icon-btn" title="Add file">
            <span>+</span>
            <input type="file" id="file-upload" style="display:none" onchange="handleFileUpload(this)">
        </label>
        
        <input type="text" id="user-input" placeholder="Ask NaviAI anything..." onkeypress="if(event.key==='Enter') send()">
        
        <button class="icon-btn mic-btn" id="mic-btn" onclick="startVoiceRecognition()" title="Voice Input">
            <img src="https://cdn-icons-png.flaticon.com/512/709/709682.png" width="20" alt="Mic">
        </button>
        
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const historyList = document.getElementById('history-list');
        const landingContainer = document.getElementById('landing-container');
        let currentChatId = null;

        function scrollToBottom() { 
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' }); 
        }

        function startNewChat() {
            currentChatId = null;
            chatWindow.innerHTML = landingContainer.outerHTML; 
        }

        async function loadThread(chatId) {
            if(!chatId) return;
            currentChatId = chatId;
            chatWindow.innerHTML = ""; 
            
            try {
                const res = await fetch(`/get_chat/${chatId}`);
                const data = await res.json();
                if(data.messages) {
                    data.messages.forEach(msg => {
                        addMessage(msg.role === 'user' ? 'User' : 'AI', msg.content, true);
                    });
                }
            } catch(e) { console.error("History error:", e); }
        }

        function quickAsk(query) {
            document.getElementById('user-input').value = query;
            send();
        }

        function addMessage(role, text, skipLanding = false) {
            const isAI = role === 'AI';
            if(!skipLanding) {
                const landing = chatWindow.querySelector('#landing-container');
                if(landing) landing.remove();
            }

            const label = isAI ? 'NaviAI✨' : '{{ user.name[0] }}';
            const html = `
                <div class="message-wrapper ${isAI ? '' : 'user-wrapper'}">
                    <div class="avatar ${isAI ? 'ai-avatar' : 'user-avatar'}">${label}</div>
                    <div class="bubble ${isAI ? 'ai-bubble' : 'user-bubble'}">${isAI ? marked.parse(text) : text}</div>
                </div>`;
            chatWindow.innerHTML += html;
            scrollToBottom();
        }

        function updateSidebar(q, id) {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerText = q.substring(0, 50) + "...";
            card.onclick = () => loadThread(id);
            historyList.prepend(card); 
        }

        async function send() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            if(!query) return;

            addMessage('User', query);
            input.value = "";

            const loadingId = 'loading-' + Date.now();
            chatWindow.innerHTML += `<div class="message-wrapper" id="${loadingId}"><div class="avatar ai-avatar">NaviAI</div><div class="bubble ai-bubble italic">Thinking...</div></div>`;
            scrollToBottom();

            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query, chat_id: currentChatId})
            });
            const data = await res.json();
            
            document.getElementById(loadingId).remove();
            addMessage('AI', data.response);

            if (!currentChatId && data.chat_id) {
                currentChatId = data.chat_id;
                updateSidebar(query, data.chat_id);
            }
        }
function startVoiceRecognition() {
    const micBtn = document.getElementById('mic-btn');
    const userInput = document.getElementById('user-input');
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Your browser does not support Speech Recognition.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-IN'; 

    recognition.onstart = () => {
        micBtn.classList.add('active');
        userInput.placeholder = "Listening...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
    };

    recognition.onend = () => {
        micBtn.classList.remove('active');
        userInput.placeholder = "Ask NaviAI anything...";
    };

    recognition.start();
}


function handleFileUpload(input) {
    if (input.files && input.files[0]) {
        const fileName = input.files[0].name;
        document.getElementById('user-input').value = `📎 ${fileName}`;
    }
}
    </script>
</body>
</html>
